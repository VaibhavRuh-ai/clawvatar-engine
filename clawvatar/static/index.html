<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clawvatar</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:sans-serif;background:#111;color:#ddd;height:100vh;display:flex;flex-direction:column}
        .top{background:#1a1a1a;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #333}
        .top h1{font-size:16px;color:#fff}
        .top h1 b{color:#7c6ef0}
        .top .st{font-size:11px;padding:3px 10px;border-radius:10px}
        .st.off{background:#331a1a;color:#f66}
        .st.on{background:#1a331a;color:#6f6}
        .wrap{flex:1;display:flex;overflow:hidden}
        #view{flex:1;position:relative}
        canvas{width:100%;height:100%;display:block}
        .side{width:320px;background:#1a1a1a;border-left:1px solid #333;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
        .card{background:#222;border-radius:8px;padding:12px}
        .card h3{font-size:11px;color:#888;text-transform:uppercase;margin-bottom:8px}
        .btn{width:100%;padding:10px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;color:#fff;margin-top:6px}
        .btn-p{background:#7c6ef0}
        .btn-p:hover{background:#6a5bd6}
        .btn-g{background:#2a6a3a}
        .btn-g:hover{background:#3a7a4a}
        .btn-r{background:#6a2a2a}
        .btn-r:hover{background:#7a3a3a}
        input[type=file]{display:none}
        .upload{border:2px dashed #444;border-radius:8px;padding:16px;text-align:center;cursor:pointer;color:#666;font-size:12px}
        .upload:hover{border-color:#7c6ef0}
        #log{font-size:10px;font-family:monospace;line-height:1.7;max-height:200px;overflow-y:auto;color:#555}
        #log .ok{color:#6f6}#log .er{color:#f66}
        .bar{height:5px;background:#333;border-radius:3px;margin:6px 0}
        .bar>div{height:100%;background:linear-gradient(90deg,#6f6,#7c6ef0);border-radius:3px;width:0%;transition:width .05s}
        .info{font-size:11px;color:#666;line-height:1.6}
    </style>
</head>
<body>
<div class="top">
    <h1><b>Claw</b>vatar</h1>
    <span id="st" class="st off">Disconnected</span>
</div>
<div class="wrap">
    <div id="view"><canvas id="c"></canvas></div>
    <div class="side">
        <div class="card">
            <h3>1. Upload Avatar (.vrm)</h3>
            <div class="upload" onclick="document.getElementById('fi').click()">Click or drop .vrm file here</div>
            <input type="file" id="fi" accept=".vrm,.glb">
            <div id="ai" class="info" style="margin-top:6px"></div>
        </div>
        <div class="card">
            <h3>2. Connect</h3>
            <button class="btn btn-p" onclick="doConnect()" id="btnC">Connect</button>
        </div>
        <div class="card">
            <h3>3. Send Audio</h3>
            <p class="info">Upload audio file or use mic. Same audio plays back with avatar animation.</p>
            <input type="file" id="audioFile" accept=".wav,.mp3,.ogg,.webm">
            <button class="btn btn-g" onclick="document.getElementById('audioFile').click()">Upload Audio File</button>
            <button class="btn btn-p" onclick="toggleMic()" id="btnM">Start Mic</button>
            <div class="bar"><div id="lvl"></div></div>
        </div>
        <div class="card">
            <h3>Log</h3>
            <div id="log"></div>
        </div>
    </div>
</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';

let VRMLoaderPlugin;
try {
    const m = await import('https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.1.1/lib/three-vrm.module.min.js');
    VRMLoaderPlugin = m.VRMLoaderPlugin;
} catch(e) { log('VRM plugin failed: '+e.message,'er'); }

// --- Three.js ---
const canvas = document.getElementById('c');
const R = new THREE.WebGLRenderer({canvas, antialias:true});
R.setPixelRatio(Math.min(devicePixelRatio,2));
R.outputColorSpace = THREE.SRGBColorSpace;
R.toneMapping = THREE.ACESFilmicToneMapping;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a22);
const cam = new THREE.PerspectiveCamera(20,1,0.01,100);
cam.position.set(0,1.3,2.5);
const ctrl = new OrbitControls(cam,canvas);
ctrl.target.set(0,1.0,0);
ctrl.enableDamping=true;
ctrl.update();

scene.add(new THREE.AmbientLight(0xffffff,0.8));
const dl=new THREE.DirectionalLight(0xffffff,1.2);dl.position.set(2,3,2);scene.add(dl);
const fl=new THREE.DirectionalLight(0x8888ff,0.4);fl.position.set(-2,1,-1);scene.add(fl);
scene.add(new THREE.GridHelper(4,20,0x333333,0x222222));

const loader = new GLTFLoader();
if(VRMLoaderPlugin) loader.register(p=>new VRMLoaderPlugin(p));

function onResize(){
    const v=document.getElementById('view');
    R.setSize(v.clientWidth,v.clientHeight);
    cam.aspect=v.clientWidth/v.clientHeight;
    cam.updateProjectionMatrix();
}
addEventListener('resize',onResize);
onResize();

let vrm=null, clock=new THREE.Clock();
let curW={}, tgtW={}, curH={y:0,p:0,r:0}, tgtH={y:0,p:0,r:0};
let headBone=null;

// Server blend shape name → VRM expression name mapping
const NAMEMAP={
    'blendShape2.mouth_a':'aa',
    'blendShape2.mouth_i':'ih',
    'blendShape2.mouth_u':'ou',
    'blendShape2.mouth_e':'ee',
    'blendShape2.mouth_o':'oh',
    'blendShape2.Blink_L':'blinkLeft',
    'blendShape2.Blink_R':'blinkRight',
    'blendShape2.happy':'happy',
    'blendShape2.angry':'angry',
    'blendShape2.sorrow':'sad',
    'blendShape2.joy':'surprised',
};

function lerp(a,b,t){return a+(b-a)*t}

function animate(){
    requestAnimationFrame(animate);
    ctrl.update();

    // Interpolate weights toward target at 60fps
    const allK=new Set([...Object.keys(curW),...Object.keys(tgtW)]);
    for(const k of allK){
        const c=curW[k]||0, t=tgtW[k]||0;
        const v=lerp(c,t,0.25);
        if(v>0.003) curW[k]=v; else delete curW[k];
    }
    curH.y=lerp(curH.y,tgtH.y,0.12);
    curH.p=lerp(curH.p,tgtH.p,0.12);
    curH.r=lerp(curH.r,tgtH.r,0.12);

    // Apply to VRM with name mapping
    if(vrm){
        const em=vrm.expressionManager;
        if(em){
            for(const n of Object.keys(em.expressionMap)) try{em.setValue(n,0)}catch(e){}
            for(const[k,v] of Object.entries(curW)){
                const name=NAMEMAP[k]||k;
                try{em.setValue(name,Math.min(1,v))}catch(e){}
            }
        }
        if(headBone){
            headBone.rotation.y=curH.y*Math.PI/180;
            headBone.rotation.x=curH.p*Math.PI/180;
            headBone.rotation.z=curH.r*Math.PI/180;
        }
        vrm.update(clock.getDelta());
    }
    R.render(scene,cam);
}
animate();

// --- Load VRM ---
document.getElementById('fi').onchange=async function(){
    if(!this.files.length)return;
    const file=this.files[0];
    log('Loading '+file.name+'...');
    const url=URL.createObjectURL(file);
    if(vrm){scene.remove(vrm.scene);vrm=null;headBone=null;}
    try{
        const gltf=await loader.loadAsync(url);
        vrm=gltf.userData.vrm;
        if(vrm){
            scene.add(vrm.scene);
            cam.position.set(0,1.35,0.9);
            ctrl.target.set(0,1.3,0);
            ctrl.update();
            // Relax arms
            try{
                const h=vrm.humanoid;
                if(h){
                    const la=h.getNormalizedBoneNode('leftUpperArm');
                    const ra=h.getNormalizedBoneNode('rightUpperArm');
                    if(la)la.rotation.z=1.2;
                    if(ra)ra.rotation.z=-1.2;
                    headBone=h.getNormalizedBoneNode('head');
                }
            }catch(e){}
            const names=vrm.expressionManager?Object.keys(vrm.expressionManager.expressionMap):[];
            document.getElementById('ai').textContent='Expressions: '+names.join(', ');
            log('VRM loaded: '+names.length+' expressions','ok');

            // Upload to server
            if(ws&&ws.readyState===1){
                const fd=new FormData();fd.append('file',file);
                try{
                    const r=await fetch(location.protocol+'//'+location.host+'/upload',{method:'POST',body:fd});
                    const d=await r.json();
                    if(!d.error){ws.send(JSON.stringify({type:'avatar.load',model_path:d.path}));log('Server synced','ok');}
                }catch(e){}
            }
        }
    }catch(e){log('Load error: '+e.message,'er');}
    URL.revokeObjectURL(url);
};

// Drag drop
const view=document.getElementById('view');
view.ondragover=e=>{e.preventDefault()};
view.ondrop=e=>{e.preventDefault();if(e.dataTransfer.files.length){document.getElementById('fi').files=e.dataTransfer.files;document.getElementById('fi').onchange();}};

// --- WebSocket ---
var ws=null;

window.doConnect=function(){
    if(ws&&ws.readyState===1){ws.close();return;}
    const url=(location.protocol==='https:'?'wss:':'ws:')+'//'+location.host+'/ws';
    log('Connecting...');
    ws=new WebSocket(url);
    ws.onopen=function(){
        document.getElementById('st').className='st on';
        document.getElementById('st').textContent='Connected';
        document.getElementById('btnC').textContent='Disconnect';
        log('Connected','ok');
    };
    ws.onclose=function(){
        document.getElementById('st').className='st off';
        document.getElementById('st').textContent='Disconnected';
        document.getElementById('btnC').textContent='Connect';
        log('Disconnected');
    };
    ws.onerror=function(){log('Connection error','er')};
    ws.onmessage=function(e){
        try{
            const msg=JSON.parse(e.data);
            if(msg.type==='weights'){
                tgtW=msg.weights||{};
                tgtH={y:(msg.head&&msg.head.yaw)||0,p:(msg.head&&msg.head.pitch)||0,r:(msg.head&&msg.head.roll)||0};
            }else if(msg.type==='avatar.ready'){
                log('Avatar ready: '+(msg.info&&msg.info.name),'ok');
            }else if(msg.type==='error'){
                log('Error: '+msg.message,'er');
            }
        }catch(err){}
    };
};

// --- Audio File Upload ---
document.getElementById('audioFile').onchange=async function(){
    if(!this.files.length){log('No file selected','er');return;}
    if(!ws||ws.readyState!==1){log('Connect first','er');return;}
    const file=this.files[0];
    log('Loading audio: '+file.name);

    try{
        const buf=await file.arrayBuffer();

        // Decode at native rate
        const decodeCtx=new AudioContext();
        const decoded=await decodeCtx.decodeAudioData(buf.slice(0));
        const nativeRate=decoded.sampleRate;
        const nativePcm=decoded.getChannelData(0);
        const duration=nativePcm.length/nativeRate;
        log('Decoded: '+nativeRate+'Hz, '+duration.toFixed(1)+'s');

        // Downsample to 16kHz for server
        const targetRate=16000;
        const ratio=nativeRate/targetRate;
        const dsLen=Math.round(nativePcm.length/ratio);
        const ds=new Float32Array(dsLen);
        for(let i=0;i<dsLen;i++){
            const idx=i*ratio;
            const lo=Math.floor(idx);
            const hi=Math.min(lo+1,nativePcm.length-1);
            const f=idx-lo;
            ds[i]=nativePcm[lo]*(1-f)+nativePcm[hi]*f;
        }

        // STEP 1: Send entire audio as one batch, get all weights back at once
        log('Sending to server...','ok');

        // Convert entire downsampled audio to int16 base64
        const fullI16=new Int16Array(ds.length);
        for(let j=0;j<ds.length;j++) fullI16[j]=Math.max(-32768,Math.min(32767,Math.round(ds[j]*32768)));
        const fullBytes=new Uint8Array(fullI16.buffer);
        let fullBin='';for(let j=0;j<fullBytes.length;j++) fullBin+=String.fromCharCode(fullBytes[j]);

        // Send batch request and wait for response
        const allWeights=await new Promise((resolve,reject)=>{
            const origHandler=ws.onmessage;
            ws.onmessage=function(e){
                try{
                    const msg=JSON.parse(e.data);
                    if(msg.type==='batch_weights'){
                        ws.onmessage=origHandler;
                        resolve(msg.frames);
                    }else if(msg.type==='error'){
                        ws.onmessage=origHandler;
                        reject(new Error(msg.message));
                    }else if(origHandler) origHandler(e);
                }catch(err){ws.onmessage=origHandler;reject(err);}
            };
            ws.send(JSON.stringify({type:'audio.batch',data:btoa(fullBin),sample_rate:targetRate,chunk_size:1024}));
        });

        log('Got '+allWeights.length+' frames. Playing...','ok');

        // STEP 2: Play audio + animate in PERFECT sync
        const playBuf2=await decodeCtx.decodeAudioData(buf.slice(0));
        const src=decodeCtx.createBufferSource();
        src.buffer=playBuf2;
        src.connect(decodeCtx.destination);

        const chunkDuration=1024/targetRate; // 64ms per frame
        const startTime=decodeCtx.currentTime;
        src.start(startTime);

        let fi=0;
        function syncPlay(){
            const elapsed=decodeCtx.currentTime-startTime;
            const targetFrame=Math.floor(elapsed/chunkDuration);

            if(targetFrame!==fi && targetFrame<allWeights.length){
                fi=targetFrame;
                const f=allWeights[fi];
                tgtW=f.w||{};
                const h=f.h||{};
                tgtH={y:h.yaw||0,p:h.pitch||0,r:h.roll||0};
            }

            if(elapsed<duration){
                requestAnimationFrame(syncPlay);
            }else{
                tgtW={};tgtH={y:0,p:0,r:0};
                log('Playback complete','ok');
            }
        }
        syncPlay();

        src.onended=()=>decodeCtx.close();
    }catch(e){
        log('Audio error: '+e.message,'er');
        console.error(e);
    }
    this.value='';
};

// --- Mic ---
var micStream=null,micProc=null,micCtx=null,micOn=false;

window.toggleMic=function(){
    if(micOn){stopMic();return;}
    startMic();
};

async function startMic(){
    if(!ws||ws.readyState!==1){log('Connect first','er');return;}
    try{
        micStream=await navigator.mediaDevices.getUserMedia({audio:{channelCount:1,echoCancellation:true,noiseSuppression:true}});
        micCtx=new AudioContext();
        const rate=micCtx.sampleRate;
        const src=micCtx.createMediaStreamSource(micStream);
        micProc=micCtx.createScriptProcessor(4096,1,1);
        micProc.onaudioprocess=function(e){
            const raw=e.inputBuffer.getChannelData(0);
            // Show level
            let s=0;for(let i=0;i<raw.length;i++) s+=raw[i]*raw[i];
            document.getElementById('lvl').style.width=Math.min(100,Math.sqrt(s/raw.length)*500)+'%';
            // Downsample to 16kHz
            const ratio=rate/16000;
            const len=Math.round(raw.length/ratio);
            const ds=new Float32Array(len);
            for(let i=0;i<len;i++){const idx=i*ratio;const lo=Math.floor(idx);const hi=Math.min(lo+1,raw.length-1);const f=idx-lo;ds[i]=raw[lo]*(1-f)+raw[hi]*f;}
            // Send
            const i16=new Int16Array(ds.length);
            for(let j=0;j<ds.length;j++) i16[j]=Math.max(-32768,Math.min(32767,Math.round(ds[j]*32768)));
            const bytes=new Uint8Array(i16.buffer);
            let bin='';for(let j=0;j<bytes.length;j++) bin+=String.fromCharCode(bytes[j]);
            ws.send(JSON.stringify({type:'audio',data:btoa(bin),sample_rate:16000}));
        };
        src.connect(micProc);
        micProc.connect(micCtx.destination);
        micOn=true;
        document.getElementById('btnM').textContent='Stop Mic';
        document.getElementById('btnM').className='btn btn-r';
        log('Mic started ('+rate+'Hz -> 16kHz)','ok');
    }catch(e){log('Mic error: '+e.message,'er');}
}

function stopMic(){
    if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}
    if(micProc){micProc.disconnect();micProc=null;}
    if(micCtx){micCtx.close();micCtx=null;}
    micOn=false;
    document.getElementById('btnM').textContent='Start Mic';
    document.getElementById('btnM').className='btn btn-p';
    document.getElementById('lvl').style.width='0%';
    log('Mic stopped');
}

// --- Log ---
function log(msg,cls){
    const d=document.createElement('div');
    d.className=cls||'';
    d.textContent=new Date().toLocaleTimeString()+' '+msg;
    const box=document.getElementById('log');
    box.appendChild(d);
    box.scrollTop=99999;
}
window.log=log;

log('Ready. Upload VRM → Connect → Send audio.','ok');
</script>
</body>
</html>
